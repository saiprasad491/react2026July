<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React using cdn</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  </head>
  <body>
    <div id="example"></div>

    <script>
      const rElement = React.createElement('h1', {}, 'Hello World 2026!');
      const domElement = document.getElementById('example');

      //ReactDOM.render(rElement, domElement);
      const root = ReactDOM.createRoot(domElement); //create root container
      root.render(rElement);
    </script>
  </body>
</html>
