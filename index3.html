<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rendering multiple elements</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  </head>
  <body>
    <div id="example"></div>

    <script>
      const heading = React.createElement('p',{key:'1'},'This is para1');
      const title = React.createElement('span',{key:'2'},'This is span');
      const container = React.createElement('div',{},[heading,title]);

      const domEle = document.getElementById('example');
      
      const root = ReactDOM.createRoot(domEle);
      root.render(container);
    </script>
  </body>
</html>
