<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rendering multiple elements</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  </head>
  <body>
    <div id="example"></div>

    <script type="text/babel">
      const heading = <h1 style={{color:'red', background:'yellow'}}>
                        Hello World  
                        <span style={{color:'blue'}}>2026</span>
                      </h1>;  //JSX

      const domEle = document.getElementById('example');
      
      const root = ReactDOM.createRoot(domEle);
      root.render(heading);
    </script>
  </body>
</html>
